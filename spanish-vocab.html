<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spanish Vocabulary Practice</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2rem);
      line-height: 1.1;
    }

    .sub {
      margin: 0 0 20px;
      color: #475569;
      line-height: 1.45;
      font-size: 0.98rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .audio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
      align-items: stretch;
    }

    .field, .checkbox-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checkbox-card {
      justify-content: center;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 78px;
    }

    .checkbox-inline {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 48px;
    }

    .voice-card {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 78px;
      justify-content: center;
    }

    .voice-card select {
      min-height: 48px;
    }

    .info-card {
      justify-content: center;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 78px;
    }

    .info-value {
      min-height: 48px;
      display: flex;
      align-items: center;
      color: #0f172a;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    input[type="number"], select, button {
      font: inherit;
    }

    input[type="number"], select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      background: white;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .primary {
      background: #0f172a;
      color: white;
    }

    .secondary {
      background: white;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .display {
      min-height: 280px;
      border-radius: 24px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 44px 20px 20px;
      position: relative;
      overflow: hidden;
    }

    #mainDisplay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 36px);
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: 0;
    }

    #replayWrap {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      margin: 0;
      width: max-content;
      max-width: calc(100% - 120px);
    }

    .phase {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .big-word {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 600;
      line-height: 1.2;
      text-align: center;
      max-width: 800px;
      word-break: break-word;
    }

    .replay-wrap {
      margin-top: 22px;
      position: static;
    }

    .display-control-corner {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 2;
    }

    .display-control-corner-left {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 2;
    }

    .display-control-corner-top-left {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 2;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: white;
      color: #0f172a;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      padding: 0;
    }

    .icon-button:hover {
      background: #f8fafc;
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      display: block;
    }

    #reverseBtn svg {
      width: 24px;
      height: 24px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .badge {
      padding: 0 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      color: #475569;
      font-size: 0.92rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      white-space: nowrap;
      line-height: 1;
    }

    .options-meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .category-control {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #334155;
      font-size: 0.92rem;
      font-weight: 600;
      white-space: nowrap;
      min-height: 36px;
    }

    #optionsMeta select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      width: auto;
      min-width: 190px;
      max-width: 280px;
      height: 36px;
      padding: 0 38px 0 14px;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      background-color: #f8fafc;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none'><path d='M5 7.5L10 12.5L15 7.5' stroke='%23475569' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px 16px;
      color: #475569;
      line-height: 1;
      box-shadow: none;
      outline: none;
      margin: 0;
      vertical-align: middle;
    }

    #optionsMeta select:focus {
      border-color: #94a3b8;
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
        align-items: stretch;
      }

      .app {
        padding: 16px;
        border-radius: 20px;
      }

      .controls,
      .audio-row {
        grid-template-columns: 1fr;
      }

      .sub {
        margin-bottom: 16px;
        font-size: 0.95rem;
      }

      .display {
        min-height: 240px;
        padding: 42px 14px 18px;
        border-radius: 20px;
      }

      #mainDisplay {
        width: calc(100% - 24px);
      }

      .phase {
        top: 12px;
        font-size: 0.7rem;
        width: 170px;
      }

      .display-control-corner,
      .display-control-corner-left {
        bottom: 12px;
      }

      .display-control-corner {
        right: 12px;
      }

      .display-control-corner-left {
        left: 12px;
      }

      .display-control-corner-top-left {
        left: 12px;
        top: 12px;
      }

      .icon-button {
        width: 48px;
        height: 48px;
      }

      .secondary,
      .primary,
      input[type="number"],
      select {
        min-height: 48px;
      }

      .badges {
        gap: 6px;
      }

      .badge {
        font-size: 0.78rem;
        height: 32px;
        padding: 0 10px;
      }

      .options-meta-row {
        display: block;
        margin-top: 12px;
      }

      .category-control {
        display: block;
        min-height: 0;
        font-size: 0.92rem;
      }

      #optionsMeta select {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        height: 48px;
        padding: 0 42px 0 14px;
        border-radius: 14px;
        background-position: right 14px center;
        background-size: 18px 18px;
        margin-top: 8px;
      }

      #replayWrap {
        bottom: 12px;
        max-width: calc(100% - 104px);
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 8px;
      }

      .app {
        padding: 14px;
      }

      h1 {
        font-size: 1.45rem;
      }

      .display {
        min-height: 220px;
      }

      .big-word {
        font-size: clamp(1.55rem, 8vw, 2.2rem);
      }

      .badge {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Spanish Vocabulary Practice</h1>
    <p class="sub" id="topDescription">Shows a random English phrase for 5 seconds, then the Spanish phrase for 5 seconds, then repeats automatically.</p>

    <div style="margin: -8px 0 24px;">
      <a href="#" id="showOptionsLink" style="color: #0f172a; font-weight: 600; text-decoration: underline;">Show Options</a>
      <a href="#" id="hideOptionsLink" style="color: #0f172a; font-weight: 600; text-decoration: underline; display: none;">Hide Options</a>
    </div>

    <div id="optionsPanel" style="display: none;">
      <div class="controls">
        <div class="field info-card">
          <label>Loaded rows</label>
          <div class="info-value" id="loadedRowsValue">Loading...</div>
        </div>

        <div class="field info-card">
          <label>Current category</label>
          <div class="info-value" id="currentTabValue">Loading...</div>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="newPhraseBtn" class="primary">New Phrase</button>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="englishDurationInput">English duration (seconds)</label>
          <input id="englishDurationInput" type="number" min="1" max="60" step="0.5" value="5" />
        </div>

        <div class="field">
          <label for="spanishDurationInput">Spanish duration (seconds)</label>
          <input id="spanishDurationInput" type="number" min="1" max="60" step="0.5" value="5" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="applyTimingBtn" class="secondary">Apply timing</button>
        </div>
      </div>

      <div class="audio-row">
        <label class="checkbox-card">
          <span>Pronunciation</span>
          <span class="checkbox-inline">
            <input id="audioToggle" type="checkbox" checked />
            <span>Play pronunciation automatically</span>
          </span>
        </label>

        <div class="field voice-card">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect">
            <option value="">Loading voices...</option>
          </select>
        </div>
      </div>
    </div>

    <div class="display" id="displayBox">
      <div id="phaseLabel" class="phase">Start</div>
      <div id="mainDisplay" class="big-word">Click to start<br>Haz clic para empezar</div>

      <div class="display-control-corner-top-left">
        <button id="muteBtn" class="icon-button" aria-label="Mute audio">
          <svg id="muteIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 5.23 9.91 9H6a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h3.91L14 18.77a1 1 0 0 0 1.68-.74V5.97A1 1 0 0 0 14 5.23z"></path>
            <path d="M18.5 8.5a1 1 0 0 1 1.41 0A5.96 5.96 0 0 1 21.5 12a5.96 5.96 0 0 1-1.59 3.5 1 1 0 1 1-1.48-1.34A3.97 3.97 0 0 0 19.5 12c0-.83-.25-1.6-.67-2.16a1 1 0 0 1-.33-.74c0-.22.07-.44.2-.6z"></path>
          </svg>
        </button>
      </div>

      <div class="replay-wrap" id="replayWrap" style="display:none;">
        <button id="replayBtn" class="secondary">Replay audio</button>
      </div>

      <div class="display-control-corner-left">
        <button id="reverseBtn" class="icon-button" aria-label="Reverse order">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 7a5 5 0 0 1 8.66-2H13v2h6V1h-2v2.34A7 7 0 0 0 5 7h2zm10 10a5 5 0 0 1-8.66 2H11v-2H5v6h2v-2.34A7 7 0 0 0 19 17h-2z"/>
          </svg>
        </button>
      </div>

      <div class="display-control-corner">
        <button id="pausePlayBtn" class="icon-button" aria-label="Pause">
          <svg id="pausePlayIcon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="6" y="5" width="4" height="14" rx="1"></rect>
            <rect x="14" y="5" width="4" height="14" rx="1"></rect>
          </svg>
        </button>
      </div>
    </div>

    <div id="optionsMeta">
      <div class="options-meta-row">
        <div class="badges">
          <div class="badge" id="englishDurationBadge">5s English</div>
          <div class="badge" id="spanishDurationBadge">5s Spanish</div>
          <div class="badge" id="rowsBadge">Rows: Loading...</div>
          <div class="badge" id="audioBadge">Audio: On</div>
        </div>

        <label class="category-control" for="tabSelect">
          <span>Category</span>
          <select id="tabSelect">
            <option value="">Loading tabs...</option>
          </select>
        </label>
      </div>
    </div>

    <div class="footer">
      © Señor Mids <span id="year"></span>
    </div>
  </div>

  <script>
    const API_BASE = 'https://script.google.com/macros/s/AKfycbwxLuqY66rTHX9bf9LxZ4UaOXPQb4dQIIILd73gEs0o3LuDFxKJJwqevteRwZBJP8DMLg/exec';

    const newPhraseBtn = document.getElementById('newPhraseBtn');
    const reverseBtn = document.getElementById('reverseBtn');
    const pausePlayBtn = document.getElementById('pausePlayBtn');
    const englishDurationInput = document.getElementById('englishDurationInput');
    const spanishDurationInput = document.getElementById('spanishDurationInput');
    const applyTimingBtn = document.getElementById('applyTimingBtn');
    const audioToggle = document.getElementById('audioToggle');
    const voiceSelect = document.getElementById('voiceSelect');
    const phaseLabel = document.getElementById('phaseLabel');
    const mainDisplay = document.getElementById('mainDisplay');
    const replayWrap = document.getElementById('replayWrap');
    const replayBtn = document.getElementById('replayBtn');
    const englishDurationBadge = document.getElementById('englishDurationBadge');
    const spanishDurationBadge = document.getElementById('spanishDurationBadge');
    const rowsBadge = document.getElementById('rowsBadge');
    const audioBadge = document.getElementById('audioBadge');
    const topDescription = document.getElementById('topDescription');
    const showOptionsLink = document.getElementById('showOptionsLink');
    const hideOptionsLink = document.getElementById('hideOptionsLink');
    const optionsPanel = document.getElementById('optionsPanel');
    const displayBox = document.getElementById('displayBox');
    const loadedRowsValue = document.getElementById('loadedRowsValue');
    const currentTabValue = document.getElementById('currentTabValue');
    const tabSelect = document.getElementById('tabSelect');
    const muteBtn = document.getElementById('muteBtn');

    let availableTabs = [];
    let rows = [];
    let currentRow = null;
    let phase = 'idle';
    let timer = null;
    let isPaused = false;
    let hasStarted = false;
    let isReversed = false;
    let spanishVoices = [];
    let audioUnlocked = false;
    let pendingSpeechText = null;
    let isSpeaking = false;
    let iosRetryTimer = null;
    let isMuted = false;
    let currentTab = '';

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    async function loadTabs() {
      tabSelect.innerHTML = '<option value="">Loading tabs...</option>';
      tabSelect.disabled = true;
      loadedRowsValue.textContent = 'Loading...';
      currentTabValue.textContent = 'Loading...';
      rowsBadge.textContent = 'Rows: Loading...';

      try {
        const res = await fetch(`${API_BASE}?action=tabs`, { cache: 'no-store' });
        const data = await res.json();

        if (!data.ok || !Array.isArray(data.tabs) || !data.tabs.length) {
          throw new Error('Unable to load tabs');
        }

        availableTabs = data.tabs;
        tabSelect.innerHTML = availableTabs
          .map(tab => `<option value="${escapeHtml(tab)}">${escapeHtml(tab)}</option>`)
          .join('');
        tabSelect.disabled = false;

        const preferredTab = availableTabs.includes('Todo') ? 'Todo' : availableTabs[0];
        tabSelect.value = preferredTab;
        currentTab = preferredTab;
        currentTabValue.textContent = currentTab;

        await loadRowsForTab(currentTab);
      } catch (err) {
        availableTabs = [];
        tabSelect.innerHTML = '<option value="">Unable to load tabs</option>';
        loadedRowsValue.textContent = 'Error';
        currentTabValue.textContent = 'Error';
        rowsBadge.textContent = 'Rows: Error';
        phase = 'idle';
        mainDisplay.className = 'big-word';
        mainDisplay.innerHTML = 'Unable to load sheet tabs<br><span style="font-size:0.55em;font-weight:500;">Check your Apps Script deployment and permissions</span>';
        phaseLabel.textContent = 'ERROR';
      }
    }

    async function loadRowsForTab(tabName) {
      currentTab = tabName;
      currentTabValue.textContent = currentTab;
      loadedRowsValue.textContent = 'Loading...';
      rowsBadge.textContent = 'Rows: Loading...';
      rows = [];
      currentRow = null;
      clearCycle();

      try {
        const res = await fetch(`${API_BASE}?action=rows&tab=${encodeURIComponent(tabName)}`, { cache: 'no-store' });
        const data = await res.json();

        if (!data.ok || !Array.isArray(data.rows)) {
          throw new Error('Unable to load rows');
        }

        rows = data.rows
          .map((row, index) => ({
            english: String(row.english ?? '').trim(),
            spanish: String(row.spanish ?? '').trim(),
            index
          }))
          .filter(row => row.english && row.spanish);

        loadedRowsValue.textContent = String(rows.length);
        rowsBadge.textContent = `Rows: ${rows.length}`;

        if (!rows.length) {
          phase = 'idle';
          mainDisplay.className = 'big-word';
          mainDisplay.innerHTML = 'No usable rows found<br><span style="font-size:0.55em;font-weight:500;">Make sure the selected tab has values in columns A and B</span>';
          phaseLabel.textContent = 'ERROR';
          replayWrap.style.display = 'none';
          hasStarted = false;
          return;
        }

        phase = 'idle';
        hasStarted = false;
        render();
      } catch (err) {
        rows = [];
        loadedRowsValue.textContent = 'Error';
        rowsBadge.textContent = 'Rows: Error';
        currentTabValue.textContent = 'Error';
        phase = 'idle';
        mainDisplay.className = 'big-word';
        mainDisplay.innerHTML = 'Unable to load tab data<br><span style="font-size:0.55em;font-weight:500;">Check your Apps Script endpoint</span>';
        phaseLabel.textContent = 'ERROR';
        replayWrap.style.display = 'none';
        hasStarted = false;
      }
    }

    function getRandomRow() {
      if (!rows.length) return null;
      if (rows.length === 1) return rows[0];

      let next = rows[Math.floor(Math.random() * rows.length)];
      if (currentRow && rows.length > 1) {
        while (next === currentRow) {
          next = rows[Math.floor(Math.random() * rows.length)];
        }
      }
      return next;
    }

    function getDurations() {
      let englishSeconds = Number(englishDurationInput.value);
      let spanishSeconds = Number(spanishDurationInput.value);

      if (Number.isNaN(englishSeconds)) englishSeconds = 5;
      if (Number.isNaN(spanishSeconds)) spanishSeconds = 5;

      englishSeconds = Math.max(1, Math.min(englishSeconds, 60));
      spanishSeconds = Math.max(1, Math.min(spanishSeconds, 60));

      englishDurationInput.value = englishSeconds;
      spanishDurationInput.value = spanishSeconds;

      return {
        englishSeconds,
        spanishSeconds,
        englishMs: Math.round(englishSeconds * 1000),
        spanishMs: Math.round(spanishSeconds * 1000)
      };
    }

    function refreshDurationUI() {
      const d = getDurations();
      englishDurationBadge.textContent = `${d.englishSeconds}s English`;
      spanishDurationBadge.textContent = `${d.spanishSeconds}s Spanish`;
      topDescription.textContent = `Shows a random English phrase for ${d.englishSeconds} seconds, then the Spanish phrase for ${d.spanishSeconds} seconds, then repeats automatically.`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function selectPreferredVoice() {
      if (!spanishVoices.length) return null;
      return spanishVoices.find(v => v.name === 'Google español de Estados Unidos (es-US)')
        || spanishVoices.find(v => v.name === 'Google español de Estados Unidos' && v.lang === 'es-US')
        || spanishVoices.find(v => v.lang === 'es-US' && v.name.toLowerCase().includes('google'))
        || spanishVoices.find(v => v.lang === 'es-US')
        || spanishVoices.find(v => v.name.toLowerCase().includes('google'))
        || spanishVoices[0];
    }

    function getSelectedVoice() {
      const name = voiceSelect.value;
      return spanishVoices.find(v => v.name === name) || selectPreferredVoice();
    }

    function populateVoices() {
      if (!('speechSynthesis' in window)) {
        voiceSelect.innerHTML = '<option value="">Speech not supported</option>';
        voiceSelect.disabled = true;
        audioBadge.textContent = 'Audio: Not supported';
        return;
      }

      const voices = window.speechSynthesis.getVoices() || [];
      spanishVoices = voices.filter(v => v.lang && v.lang.toLowerCase().includes('es'));

      if (!voices.length) {
        voiceSelect.innerHTML = '<option value="">Loading voices...</option>';
        voiceSelect.disabled = true;
        audioBadge.textContent = audioToggle.checked ? 'Audio: Loading...' : 'Audio: Off';
        return;
      }

      if (!spanishVoices.length) {
        voiceSelect.innerHTML = '<option value="">No Spanish voice detected</option>';
        voiceSelect.disabled = true;
        audioBadge.textContent = audioToggle.checked ? 'Audio: No Spanish voice found' : 'Audio: Off';
        return;
      }

      voiceSelect.disabled = false;
      voiceSelect.innerHTML = spanishVoices.map(v => `<option value="${escapeHtml(v.name)}">${escapeHtml(v.name)} (${escapeHtml(v.lang)})</option>`).join('');

      let preferred;
      if (isIOS) {
        preferred =
          spanishVoices.find(v => v.name.includes('Paulina') && v.lang === 'es-MX') ||
          spanishVoices.find(v => v.name.includes('Paulina')) ||
          selectPreferredVoice();
      } else {
        preferred = selectPreferredVoice();
      }

      if (preferred) voiceSelect.value = preferred.name;
      updateAudioBadge();
    }

    function updateAudioBadge() {
      if (!('speechSynthesis' in window)) {
        audioBadge.textContent = 'Audio: Not supported';
        return;
      }

      if (!spanishVoices.length) {
        audioBadge.textContent = audioToggle.checked ? 'Audio: Loading...' : 'Audio: Off';
        return;
      }

      if (!audioToggle.checked) {
        audioBadge.textContent = 'Audio: Off';
        return;
      }

      audioBadge.textContent = audioUnlocked ? 'Audio: On' : 'Audio: Tap to enable';
    }

    function updatePausePlayButton() {
      pausePlayBtn.setAttribute('aria-label', isPaused ? 'Play' : 'Pause');
      pausePlayBtn.innerHTML = isPaused
        ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5v13l10-6.5z"></path></svg>'
        : '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"></rect><rect x="14" y="5" width="4" height="14" rx="1"></rect></svg>';
    }

    function updateMuteButton() {
      if (isMuted) {
        muteBtn.setAttribute('aria-label', 'Unmute audio');
        muteBtn.style.background = '#0f172a';
        muteBtn.style.color = '#ffffff';
        muteBtn.style.borderColor = '#0f172a';
        muteBtn.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9v6h4l5 5V4L8 9H4z"></path>
            <path d="M17 9l4 4M21 9l-4 4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" fill="none"></path>
          </svg>
        `;
      } else {
        muteBtn.setAttribute('aria-label', 'Mute audio');
        muteBtn.style.background = '#ffffff';
        muteBtn.style.color = '#0f172a';
        muteBtn.style.borderColor = '#cbd5e1';
        muteBtn.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 5.23 9.91 9H6a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h3.91L14 18.77a1 1 0 0 0 1.68-.74V5.97A1 1 0 0 0 14 5.23z"></path>
            <path d="M18.5 8.5a1 1 0 0 1 1.41 0A5.96 5.96 0 0 1 21.5 12a5.96 5.96 0 0 1-1.59 3.5 1 1 0 1 1-1.48-1.34A3.97 3.97 0 0 0 19.5 12c0-.83-.25-1.6-.67-2.16a1 1 0 0 1-.33-.74c0-.22.07-.44.2-.6z"></path>
          </svg>
        `;
      }
    }

    function getCurrentSpanishText() {
      return currentRow?.spanish || '';
    }

    function getCurrentEnglishText() {
      return currentRow?.english || '';
    }

    function englishPhaseIsVisible() {
      return isReversed ? phase === 'spanish' : phase === 'english';
    }

    function spanishPhaseIsVisible() {
      return isReversed ? phase === 'english' : phase === 'spanish';
    }

    function render() {
      if (phase === 'idle') {
        phaseLabel.textContent = 'START';
        mainDisplay.className = 'big-word';
        mainDisplay.innerHTML = `
  <div style="display:flex; flex-direction:column; align-items:center; line-height:1.2;">
    <div>Haz clic para empezar</div>
    <div style="font-size: 0.5em; font-weight: 500; margin-top: 8px;">Click to start</div>
  </div>
`;
        replayWrap.style.display = 'none';
        displayBox.style.cursor = 'pointer';
        return;
      }

      if (!currentRow) {
        phaseLabel.textContent = 'WAIT';
        mainDisplay.className = 'big-word';
        mainDisplay.textContent = 'Loading phrases...';
        replayWrap.style.display = 'none';
        return;
      }

      if (englishPhaseIsVisible()) {
        phaseLabel.textContent = 'ENGLISH';
        mainDisplay.className = 'big-word';
        mainDisplay.textContent = getCurrentEnglishText();
        replayWrap.style.display = 'none';
      } else {
        phaseLabel.textContent = 'SPANISH';
        mainDisplay.className = 'big-word';
        mainDisplay.textContent = getCurrentSpanishText();
        replayWrap.style.display = 'block';

        if (audioToggle.checked) {
          queueSpeech(getCurrentSpanishText());
        }
      }

      displayBox.style.cursor = 'default';
    }

    function clearCycle() {
      if (timer) clearTimeout(timer);
      if (iosRetryTimer) clearTimeout(iosRetryTimer);
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
      isSpeaking = false;
    }

    function buildUtterance(text) {
      const voice = getSelectedVoice();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = voice?.lang || 'es-ES';
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.volume = 1;

      if (voice) utterance.voice = voice;

      utterance.onstart = () => {
        isSpeaking = true;
      };

      utterance.onend = () => {
        isSpeaking = false;
      };

      utterance.onerror = () => {
        isSpeaking = false;
      };

      return utterance;
    }

    function queueSpeech(text) {
      if (isMuted) return;
      pendingSpeechText = text;
      if (!audioUnlocked || !audioToggle.checked || isPaused) return;
      playPendingSpeech();
    }

    function playPendingSpeech() {
      if (!('speechSynthesis' in window)) return;
      if (isMuted) return;
      if (!audioUnlocked || !audioToggle.checked || isPaused) return;
      if (!spanishPhaseIsVisible() || !pendingSpeechText) return;

      const text = pendingSpeechText;
      pendingSpeechText = null;

      try {
        window.speechSynthesis.cancel();
        window.speechSynthesis.resume();

        const utterance = buildUtterance(text);

        if (isIOS) {
          try {
            window.speechSynthesis.speak(utterance);
          } catch (e) {}

          if (!isSpeaking) {
            iosRetryTimer = setTimeout(() => {
              if (!isPaused && !isMuted && spanishPhaseIsVisible() && audioToggle.checked && !isSpeaking) {
                try {
                  window.speechSynthesis.cancel();
                  window.speechSynthesis.resume();
                  window.speechSynthesis.speak(buildUtterance(text));
                } catch (e) {}
              }
            }, 120);
          }

          return;
        }

        requestAnimationFrame(() => {
          setTimeout(() => {
            try {
              window.speechSynthesis.resume();
              window.speechSynthesis.speak(utterance);
            } catch (e) {}
          }, 0);
        });
      } catch (e) {}
    }

    function speakDirect(text) {
      if (!('speechSynthesis' in window)) return;
      if (isMuted) return;

      try {
        window.speechSynthesis.cancel();
        window.speechSynthesis.resume();
        window.speechSynthesis.speak(buildUtterance(text));
      } catch (e) {}
    }

    function unlockAudio() {
      if (!('speechSynthesis' in window) || audioUnlocked) return;

      audioUnlocked = true;
      updateAudioBadge();

      try {
        window.speechSynthesis.cancel();
        window.speechSynthesis.resume();
      } catch (e) {}
    }

    function primeAudioLikeReplay() {
      if (!audioToggle.checked || !('speechSynthesis' in window)) return;
      pendingSpeechText = null;
      speakDirect('Vamos a empezar');
    }

    function runCycle() {
      clearCycle();
      render();
      if (isPaused || phase === 'idle' || !currentRow) return;

      const d = getDurations();
      const delay = phase === 'english' ? d.englishMs : d.spanishMs;

      timer = setTimeout(() => {
        if (phase === 'english') {
          phase = 'spanish';
        } else {
          currentRow = getRandomRow();
          phase = 'english';
        }
        runCycle();
      }, delay);
    }

    function startNewRound() {
      if (!rows.length) return;
      currentRow = getRandomRow();
      phase = 'english';
      isPaused = false;
      hasStarted = true;
      updatePausePlayButton();
      runCycle();
    }

    englishDurationInput.addEventListener('change', refreshDurationUI);
    spanishDurationInput.addEventListener('change', refreshDurationUI);

    newPhraseBtn.addEventListener('click', () => {
      unlockAudio();
      startNewRound();
      primeAudioLikeReplay();
    });

    reverseBtn.addEventListener('click', () => {
      isReversed = !isReversed;
      refreshDurationUI();

      if (hasStarted && !isPaused) {
        clearCycle();
        render();

        const d = getDurations();
        const delay = phase === 'english' ? d.englishMs : d.spanishMs;

        timer = setTimeout(() => {
          if (phase === 'english') {
            phase = 'spanish';
          } else {
            currentRow = getRandomRow();
            phase = 'english';
          }
          runCycle();
        }, delay);
      } else {
        render();
      }
    });

    pausePlayBtn.addEventListener('click', () => {
      unlockAudio();

      if (!hasStarted) {
        startNewRound();
        primeAudioLikeReplay();
        return;
      }

      isPaused = !isPaused;
      updatePausePlayButton();

      if (isPaused) {
        clearCycle();
        render();
      } else {
        runCycle();
      }
    });

    applyTimingBtn.addEventListener('click', () => {
      unlockAudio();
      refreshDurationUI();
      if (hasStarted) runCycle();
    });

    audioToggle.addEventListener('change', () => {
      unlockAudio();
      updateAudioBadge();

      if (!audioToggle.checked && 'speechSynthesis' in window) {
        pendingSpeechText = null;
        window.speechSynthesis.cancel();
      } else if (audioToggle.checked && hasStarted && spanishPhaseIsVisible()) {
        queueSpeech(getCurrentSpanishText());
      }
    });

    replayBtn.addEventListener('click', () => {
      if (!getCurrentSpanishText() || !audioToggle.checked || !('speechSynthesis' in window)) return;
      unlockAudio();
      pendingSpeechText = null;
      speakDirect(getCurrentSpanishText());
    });

    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      updateMuteButton();
      if (isMuted && 'speechSynthesis' in window) {
        pendingSpeechText = null;
        window.speechSynthesis.cancel();
      }
    });

    voiceSelect.addEventListener('change', () => {
      unlockAudio();
      if (!audioToggle.checked || !spanishPhaseIsVisible()) return;
      queueSpeech(getCurrentSpanishText());
    });

    tabSelect.addEventListener('change', async () => {
      const selected = tabSelect.value;
      if (!selected || selected === currentTab) return;

      hasStarted = false;
      isPaused = false;
      phase = 'idle';
      updatePausePlayButton();
      await loadRowsForTab(selected);
      render();
    });

    showOptionsLink.addEventListener('click', (e) => {
      e.preventDefault();
      optionsPanel.style.display = 'block';
      showOptionsLink.style.display = 'none';
      hideOptionsLink.style.display = 'inline';
    });

    hideOptionsLink.addEventListener('click', (e) => {
      e.preventDefault();
      optionsPanel.style.display = 'none';
      showOptionsLink.style.display = 'inline';
      hideOptionsLink.style.display = 'none';
    });

    displayBox.addEventListener('click', () => {
      if (!hasStarted) {
        unlockAudio();
        startNewRound();
        primeAudioLikeReplay();
      }
    });

    document.addEventListener('pointerdown', unlockAudio, { once: true });
    document.addEventListener('keydown', unlockAudio, { once: true });
    document.addEventListener('touchstart', unlockAudio, { once: true });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && 'speechSynthesis' in window) {
        try {
          window.speechSynthesis.resume();
        } catch (e) {}
      }
    });

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = populateVoices;
      populateVoices();
      setTimeout(populateVoices, 250);
      setTimeout(populateVoices, 1000);
      setTimeout(populateVoices, 2000);
    } else {
      populateVoices();
    }

    refreshDurationUI();
    updatePausePlayButton();
    updateMuteButton();
    render();
    document.getElementById('year').textContent = new Date().getFullYear();

    loadTabs();
  </script>
</body>
</html>
