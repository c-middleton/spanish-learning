<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spanish Number Practice</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2rem);
      line-height: 1.1;
    }

    .sub {
      margin: 0 0 20px;
      color: #475569;
      line-height: 1.45;
      font-size: 0.98rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .audio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
      align-items: stretch;
    }

    .field, .checkbox-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checkbox-card {
      justify-content: center;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 78px;
    }

    .checkbox-inline {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 48px;
    }

    .voice-card {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 78px;
      justify-content: center;
    }

    .voice-card select {
      min-height: 48px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    input[type="number"], select, button {
      font: inherit;
    }

    input[type="number"], select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      background: white;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .primary {
      background: #0f172a;
      color: white;
    }

    .secondary {
      background: white;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .display {
      min-height: 280px;
      border-radius: 24px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 44px 20px 20px;
      position: relative;
      overflow: hidden;
    }

    #mainDisplay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 36px);
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: 0;
    }

    #replayWrap {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      margin: 0;
      width: max-content;
      max-width: calc(100% - 120px);
    }

    .phase {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .big-number {
      font-size: clamp(3rem, 13vw, 4.5rem);
      font-weight: 700;
      line-height: 1;
    }

    .big-word {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 600;
      line-height: 1.2;
      text-align: center;
      max-width: 800px;
      word-break: break-word;
    }

    .replay-wrap {
      margin-top: 22px;
      position: static;
    }

    .display-control-corner {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 2;
    }

    .display-control-corner-left {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 2;
    }

    /* NEW */
    .display-control-corner-top-left {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 2;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: white;
      color: #0f172a;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      padding: 0;
    }

    .icon-button:hover {
      background: #f8fafc;
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      display: block;
    }

    #reverseBtn svg {
      width: 24px;
      height: 24px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .badge {
      padding: 10px 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      color: #475569;
      font-size: 0.92rem;
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
        align-items: stretch;
      }

      .app {
        padding: 16px;
        border-radius: 20px;
      }

      .controls,
      .audio-row {
        grid-template-columns: 1fr;
      }

      .sub {
        margin-bottom: 16px;
        font-size: 0.95rem;
      }

      .display {
        min-height: 240px;
        padding: 42px 14px 18px;
        border-radius: 20px;
      }

      #mainDisplay {
        width: calc(100% - 24px);
      }

      .phase {
        top: 12px;
        font-size: 0.7rem;
        width: 170px;
      }

      .display-control-corner,
      .display-control-corner-left {
        bottom: 12px;
      }

      .display-control-corner {
        right: 12px;
      }

      .display-control-corner-left {
        left: 12px;
      }

      /* NEW */
      .display-control-corner-top-left {
        left: 12px;
        top: 12px;
      }

      .icon-button {
        width: 48px;
        height: 48px;
      }

      .secondary,
      .primary,
      input[type="number"],
      select {
        min-height: 48px;
      }

      .badges {
        gap: 6px;
        margin-top: 12px;
      }

      .badge {
        font-size: 0.78rem;
        padding: 5px 9px;
        line-height: 1;
      }

      #replayWrap {
        bottom: 12px;
        max-width: calc(100% - 104px);
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 8px;
      }

      .app {
        padding: 14px;
      }

      h1 {
        font-size: 1.45rem;
      }

      .display {
        min-height: 220px;
      }

      .big-number {
        font-size: clamp(2.5rem, 14vw, 3.4rem);
      }

      .big-word {
        font-size: clamp(1.55rem, 8vw, 2.2rem);
      }

      .badge {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Spanish Number Practice</h1>
    <p class="sub" id="topDescription">Shows a random number for 5 seconds, then the Spanish word for 3 seconds, then repeats automatically.</p>

    <div style="margin: -8px 0 24px;">
      <a href="#" id="showOptionsLink" style="color: #0f172a; font-weight: 600; text-decoration: underline;">Show Options</a>
      <a href="#" id="hideOptionsLink" style="color: #0f172a; font-weight: 600; text-decoration: underline; display: none;">Hide Options</a>
    </div>

    <div id="optionsPanel" style="display: none;">
      <div class="controls">
        <div class="field">
          <label for="minInput">Minimum</label>
          <input id="minInput" type="number" min="0" max="999999" value="0" />
        </div>

        <div class="field">
          <label for="maxInput">Maximum</label>
          <input id="maxInput" type="number" min="0" max="999999" value="100" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="newNumberBtn" class="primary">New Number</button>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="numberDurationInput">Number duration (seconds)</label>
          <input id="numberDurationInput" type="number" min="1" max="60" step="0.5" value="5" />
        </div>

        <div class="field">
          <label for="wordDurationInput">Spanish duration (seconds)</label>
          <input id="wordDurationInput" type="number" min="1" max="60" step="0.5" value="3" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="applyTimingBtn" class="secondary">Apply timing</button>
        </div>
      </div>

      <div class="audio-row">
        <label class="checkbox-card">
          <span>Pronunciation</span>
          <span class="checkbox-inline">
            <input id="audioToggle" type="checkbox" checked />
            <span>Play pronunciation automatically</span>
          </span>
        </label>

        <div class="field voice-card">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect">
            <option value="">Loading voices...</option>
          </select>
        </div>
      </div>
    </div>

    <div class="display" id="displayBox">
      <div id="phaseLabel" class="phase">Start</div>
      <div id="mainDisplay" class="big-word">Click to start<br>Haz clic para empezar</div>

      <!-- NEW MUTE BUTTON -->
      <div class="display-control-corner-top-left">
        <button id="muteBtn" class="icon-button" aria-label="Mute audio">
          <svg id="muteIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 5.23 9.91 9H6a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h3.91L14 18.77a1 1 0 0 0 1.68-.74V5.97A1 1 0 0 0 14 5.23z"></path>
            <path d="M18.5 8.5a1 1 0 0 1 1.41 0A5.96 5.96 0 0 1 21.5 12a5.96 5.96 0 0 1-1.59 3.5 1 1 0 1 1-1.48-1.34A3.97 3.97 0 0 0 19.5 12c0-.83-.25-1.6-.67-2.16a1 1 0 0 1-.33-.74c0-.22.07-.44.2-.6z"></path>
          </svg>
        </button>
      </div>

      <div class="replay-wrap" id="replayWrap" style="display:none;">
        <button id="replayBtn" class="secondary">Replay audio</button>
      </div>
      <div class="display-control-corner-left">
        <button id="reverseBtn" class="icon-button" aria-label="Reverse order">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 7a5 5 0 0 1 8.66-2H13v2h6V1h-2v2.34A7 7 0 0 0 5 7h2zm10 10a5 5 0 0 1-8.66 2H11v-2H5v6h2v-2.34A7 7 0 0 0 19 17h-2z"/>
          </svg>
        </button>
      </div>
      <div class="display-control-corner">
        <button id="pausePlayBtn" class="icon-button" aria-label="Pause">
          <svg id="pausePlayIcon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="6" y="5" width="4" height="14" rx="1"></rect>
            <rect x="14" y="5" width="4" height="14" rx="1"></rect>
          </svg>
        </button>
      </div>
    </div>

    <div id="optionsMeta">
      <div class="badges">
        <div class="badge" id="numberDurationBadge">5s number</div>
        <div class="badge" id="wordDurationBadge">3s Spanish</div>
        <div class="badge" id="rangeBadge">Current range: 0–100</div>
        <div class="badge" id="audioBadge">Audio: On</div>
      </div>
    </div>

    <div class="footer">
      © Señor Mids <span id="year"></span>
    </div>
  </div>

  <script>
    const muteBtn = document.getElementById('muteBtn');
    const muteIcon = document.getElementById('muteIcon');
    let isMuted = false;

    function updateMuteButton() {
      muteBtn.setAttribute('aria-label', isMuted ? 'Unmute audio' : 'Mute audio');
      muteBtn.innerHTML = isMuted
        ? '<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-.77-3.29-2-4.3v8.6c1.23-1.01 2-2.53 2-4.3z"/><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M19 12c0 2.33-1 4.43-2.6 5.88l1.42 1.42A9.94 9.94 0 0 0 21 12c0-2.76-1.12-5.26-2.93-7.07l-1.42 1.42A7.96 7.96 0 0 1 19 12z"/></svg>'
        : '<svg viewBox="0 0 24 24"><path d="M14 5.23 9.91 9H6a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h3.91L14 18.77a1 1 0 0 0 1.68-.74V5.97A1 1 0 0 0 14 5.23z"></path><path d="M18.5 8.5a1 1 0 0 1 1.41 0A5.96 5.96 0 0 1 21.5 12a5.96 5.96 0 0 1-1.59 3.5 1 1 0 1 1-1.48-1.34A3.97 3.97 0 0 0 19.5 12c0-.83-.25-1.6-.67-2.16a1 1 0 0 1-.33-.74c0-.22.07-.44.2-.6z"></path></svg>';
    }

    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      updateMuteButton();
      if (isMuted && 'speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    });

    // integrate mute into existing audio logic
    const originalQueueSpeech = window.queueSpeech;
    window.queueSpeech = function(text) {
      if (isMuted) return;
      originalQueueSpeech(text);
    };

    updateMuteButton();
  </script>
</body>
</html>
